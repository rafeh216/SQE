name: .NET Automated Tests

# This triggers the workflow automatically every time you push code 
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Check out your repository code
    - uses: actions/checkout@v4

    # 2. Set up the .NET environment (Matching your installed v10.0)
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    # 3. Restore any dependencies
    - name: Restore dependencies
      run: dotnet restore

    # 4. Build the solution
    - name: Build
      run: dotnet build --no-restore

    # 5. Run the test cases automatically and collect coverage [cite: 17, 22]
    - name: Test
      run: dotnet test --no-build --verbosity normal --collect:"XPlat Code Coverage"